name: Sync SDK From Config Manager OpenAPI

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Config-manager ref to sync from (branch/tag)"
        required: false
        default: "main"
        type: string
      source_sha:
        description: "Optional config-manager commit SHA (overrides source_ref)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-sdk:
    runs-on: ubuntu-latest
    env:
      CONFIG_MANAGER_REPO: arverma/config-manager
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@v4

      - name: Resolve source metadata
        id: source
        shell: bash
        run: |
          set -euo pipefail

          repo="${CONFIG_MANAGER_REPO}"
          source_repo="${repo}"
          source_ref="${{ inputs.source_ref }}"
          source_sha="${{ inputs.source_sha }}"

          if [ -z "${source_ref}" ]; then
            source_ref="main"
          fi

          spec_selector="${source_ref}"
          if [ -n "${source_sha}" ]; then
            spec_selector="${source_sha}"
          fi

          spec_url="https://raw.githubusercontent.com/${repo}/${spec_selector}/api/openapi.yaml"

          if [ -z "${source_sha}" ]; then
            source_sha="not-provided"
          fi

          {
            echo "repo=${repo}"
            echo "source_sha=${source_sha}"
            echo "source_ref=${source_ref}"
            echo "source_repo=${source_repo}"
            echo "spec_url=${spec_url}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Regenerate and validate SDK
        run: |
          mvn clean generate-sources test \
            -Dopenapi.spec.path="${{ steps.source.outputs.spec_url }}"

      - name: Create sync marker for traceability
        run: |
          mkdir -p .ci
          cat <<EOF > .ci/openapi-sync-source.txt
          source_repo=${{ steps.source.outputs.source_repo }}
          source_ref=${{ steps.source.outputs.source_ref }}
          source_sha=${{ steps.source.outputs.source_sha }}
          spec_url=${{ steps.source.outputs.spec_url }}
          generated_at_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/openapi-sdk-sync
          delete-branch: true
          commit-message: |
            chore: sync SDK from config-manager OpenAPI main
          title: |
            chore: sync SDK from config-manager OpenAPI (${{
            steps.source.outputs.source_sha }})
          body: |
            Automated SDK sync from Config Manager OpenAPI.

            Source repository: `${{ steps.source.outputs.source_repo }}`
            Source ref: `${{ steps.source.outputs.source_ref }}`
            Source SHA: `${{ steps.source.outputs.source_sha }}`
            Spec URL: `${{ steps.source.outputs.spec_url }}`

            Versioning policy:
            - No automatic SDK version bump in this PR.
            - SDK tagging/releases are manual.
          labels: |
            automation
            openapi-sync
