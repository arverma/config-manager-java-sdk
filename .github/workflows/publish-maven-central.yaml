name: Publish to Maven Central

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Publishing ${VERSION} from tag ${TAG}"

      - name: Set up Java and Maven Central credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Show signing key fingerprint (debug)
        run: |
          gpg --list-secret-keys --keyid-format long --with-fingerprint --with-colons

      - name: Deploy to Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          OPENAPI_SPEC_URL: ${{ vars.OPENAPI_SPEC_URL }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Default: matching Config Manager release tag. Override via repo variable OPENAPI_SPEC_URL.
          OPENAPI_URL="${OPENAPI_SPEC_URL:-https://raw.githubusercontent.com/arverma/config-manager/v${VERSION}/api/openapi.yaml}"
          echo "OpenAPI spec: ${OPENAPI_URL}"
          mvn -B -P release clean deploy \
            -Drevision="${VERSION}" \
            -Dopenapi.spec.path="${OPENAPI_URL}"
