name: Publish to Maven Central

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version from tag
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not parse release version from tag: ${TAG}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Publishing SDK ${VERSION} (OpenAPI pin from openapi-compat.properties)"

      - name: Set up Java and Maven Central credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Deploy to Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          OPENAPI_SPEC_URL: ${{ vars.OPENAPI_SPEC_URL }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          bash .github/scripts/resolve-openapi-spec.sh openapi.yaml
          mvn -B -P release clean deploy \
            -Drevision="${VERSION}" \
            -Dopenapi.spec.path="openapi.yaml"
