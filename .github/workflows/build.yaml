name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Build against upstream OpenAPI (main)
        env:
          OPENAPI_SPEC_URL: ${{ vars.OPENAPI_SPEC_URL }}
        run: |
          set -euo pipefail
          OPENAPI_URL="${OPENAPI_SPEC_URL:-https://raw.githubusercontent.com/arverma/config-manager/main/api/openapi.yaml}"
          bash .github/scripts/fetch-openapi.sh "${OPENAPI_URL}"
          mvn -B clean install -Dopenapi.spec.path="openapi.yaml"
